<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPrint ERP</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e3a008'/><text x='5' y='23' font-size='18' font-weight='900' fill='%23060810'>iP</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060810;color:#e2e8f0;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
input,select,textarea{font-family:inherit}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes sr{from{transform:translateX(120%)}to{transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.a{animation:fi .3s ease both}
.c{background:#0c1017;border:1px solid #1a2030;border-radius:10px;transition:border-color .2s}
.c:hover{border-color:#2a3548}
.b{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:6px;border:1px solid #1a2030;background:#0c1017;color:#c9d1d9;cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;font-family:inherit;white-space:nowrap}
.b:hover{background:#151c28}
.bp{background:#e3a008;border-color:#e3a008;color:#060810;font-weight:700}.bp:hover{background:#ca8a04}
.bg{background:#238636;border-color:#238636;color:#fff}.bg:hover{background:#1a7f37}
.br{background:#da3633;border-color:#da3633;color:#fff}
.bs{padding:3px 7px;font-size:10px}
.bd{display:inline-flex;padding:2px 6px;border-radius:8px;font-size:9px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:5px 7px;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;border-bottom:1px solid #1a2030;font-weight:600;position:sticky;top:0;background:#0c1017;z-index:1}
td{padding:5px 7px;font-size:11px;border-bottom:1px solid #0c1017}
tr:hover td{background:#0a0f1a}
.in{width:100%;padding:5px 8px;border-radius:5px;border:1px solid #1a2030;background:#060810;color:#e2e8f0;font-size:11px;outline:none}
.in:focus{border-color:#e3a008}
.mn{font-family:'JetBrains Mono',monospace}
.done{text-decoration:line-through;opacity:.4}
.ck{width:14px;height:14px;border-radius:3px;border:2px solid #1a2030;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.ck.on{background:#238636;border-color:#238636;color:#fff}
.ni{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;color:#64748b;transition:all .12s;border:1px solid transparent;margin-bottom:1px}
.ni:hover{color:#e2e8f0;background:#111827}
.ni.on{color:#e3a008;background:#18150a;border-color:#e3a00833}
.fg{display:grid;gap:5px}
.f2{grid-template-columns:1fr 1fr}
.f3{grid-template-columns:1fr 1fr 1fr}
.f4{grid-template-columns:1fr 1fr 1fr 1fr}
.loader{width:24px;height:24px;border:3px solid #1a2030;border-top-color:#e3a008;border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useMemo,useEffect} = React;

// ─── SUPABASE CONNECTION ────────────────────────────────────
const SUPABASE_URL = 'https://idjeniwznjiaanaxcjvg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkamVuaXd6bmppYWFuYXhjanZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTEzMzIsImV4cCI6MjA5MDUyNzMzMn0.ocVwlguP-u5STy73eF-FwJjUWp29QINdLiYZY0L1z9E';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── FILE UPLOAD HELPER ─────────────────────────────────
const uploadFile = async (file, folder='general') => {
  if(!file) return null;
  const ext = file.name.split('.').pop();
  const path = `${folder}/${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`;
  const {data,error} = await sb.storage.from('Uploads').upload(path, file);
  if(error){console.error('Upload error:',error);return null;}
  const {data:urlData} = sb.storage.from('Uploads').getPublicUrl(path);
  return urlData?.publicUrl || null;
};
const uploadMultiple = async (files, folder='general') => {
  const urls=[];
  for(const file of files){const url=await uploadFile(file,folder);if(url)urls.push(url);}
  return urls;
};

// ─── CONSTANTS ──────────────────────────────────────────────
const DEPTS=["Estimate","Design","Production","Printing","Fabrication","Dispatch","Installation","Accounts"];
const DC=["#3b82f6","#8b5cf6","#f59e0b","#ef4444","#dc2626","#10b981","#059669","#06b6d4"];
const SIZES=["MM","INCH","FOOT"];
const RATES=["SQFT","UNIT","RFT","NOS","SET","LOT"];
const MUNITS=["roll","nos","sheet","pcs","sqft","mtr","kg","box","set","lot"];
const FAB_P=["Laser Cutting","Router Cutting","CNC Cutting","Bending","Welding","PU Coating","Painting","Polishing","Assembly","Carpentry","3D Cutting"];

const fmt=n=>"₹"+Number(n||0).toLocaleString("en-IN",{maximumFractionDigits:0});
const fmtK=n=>n>=1e5?"₹"+(n/1e5).toFixed(1)+"L":n>=1e3?"₹"+(n/1e3).toFixed(0)+"K":fmt(n);
const cSq=(w,h,q,u)=>{if(!w||!h)return 0;const W=+w,H=+h,Q=+q||1;return u==="MM"?Math.round(W*H*Q/92903.04*100)/100:u==="INCH"?Math.round(W*H*Q/144*100)/100:u==="FOOT"?Math.round(W*H*Q*100)/100:0;};
const td=()=>new Date().toISOString().slice(0,10);
const uid=()=>""+Date.now()+Math.random().toString(36).slice(2,6);

// ═══════════════════════════════════════════════════════════
// LOGIN SCREEN
// ═══════════════════════════════════════════════════════════
function Login({onLogin,team}){
  const [sel,setSel]=useState('');
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const submit=()=>{
    const member=team.find(t=>t.name===sel);
    if(!member){setErr('Select your name');return;}
    if(member.pin&&member.pin!==pin){setErr('Wrong PIN');return;}
    onLogin(member);
  };
  return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060810"}}>
    <div className="a" style={{width:340,padding:32,background:"#0c1017",border:"1px solid #1a2030",borderRadius:16,textAlign:"center"}}>
      <div style={{width:56,height:56,borderRadius:12,background:"linear-gradient(135deg,#e3a008,#ca8a04)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20,color:"#060810",margin:"0 auto 16px"}}>iP</div>
      <h1 style={{fontSize:20,fontWeight:800,color:"#e3a008",marginBottom:4}}>iPrint ERP</h1>
      <p style={{fontSize:11,color:"#64748b",marginBottom:24}}>FY 2026-27 · Sign in to continue</p>
      <select className="in" value={sel} onChange={e=>{setSel(e.target.value);setErr('');}} style={{marginBottom:10,textAlign:"center",fontSize:13,padding:10}}>
        <option value="">Select your name...</option>
        {team.map(t=><option key={t.name} value={t.name}>{t.name} ({t.role})</option>)}
      </select>
      <input className="in mn" type="password" placeholder="Enter PIN" value={pin} onChange={e=>{setPin(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&submit()} style={{marginBottom:10,textAlign:"center",fontSize:16,padding:10,letterSpacing:8}}/>
      {err&&<p style={{color:"#f47067",fontSize:11,marginBottom:8}}>{err}</p>}
      <button className="b bp" onClick={submit} style={{width:"100%",padding:10,fontSize:13,justifyContent:"center"}}>Sign In</button>
      <p style={{fontSize:9,color:"#475569",marginTop:16}}>Jyoti Print · Juxtapose · Versahue</p>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════
function MainApp({user,onLogout,masterData}){
  const {firms,clients,suppliers,products,materials,machines,agencies,delBoys} = masterData;
  const [jobs,setJobs]=useState([]);
  const [batches,setBatches]=useState([]);
  const [items,setItems]=useState([]);
  const [grnData,setGrnData]=useState([]);
  const [pLogs,setPLogs]=useState([]);
  const [fLogs,setFLogs]=useState([]);
  const [osLogs,setOsLogs]=useState([]);
  const [dLogs,setDLogs]=useState([]);
  const [pg,setPg]=useState("dash");
  const [toast,setToast]=useState(null);
  const [search,setSearch]=useState("");
  const [col,setCol]=useState(false);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null);

  const show=useCallback((m,ok=true)=>{setToast({m,ok});setTimeout(()=>setToast(null),2500);},[]);

  // Helper: fetch ALL rows from a table (paginate past 1000 limit)
  const fetchAll = async (table, order=null, filter=null) => {
    let all=[], from=0, size=1000;
    while(true){
      let q=sb.from(table).select('*').order(order||'id',{ascending:true}).range(from,from+size-1);
      if(filter) q=filter(q);
      const {data,error}=await q;
      if(error||!data||data.length===0) break;
      all=all.concat(data);
      if(data.length<size) break;
      from+=size;
    }
    return all;
  };

  // Load data from Supabase — jobs first (fast), then items in background
  useEffect(()=>{
    async function load(){
      setLoading(true);
      // Phase 1: Load jobs + small tables (fast)
      const [j,g,pl,fl,ol,dl] = await Promise.all([
        fetchAll('jobs','id'),
        fetchAll('grn','id'),
        fetchAll('print_logs','id'),
        fetchAll('fab_logs','id'),
        fetchAll('outsource_logs','id'),
        fetchAll('dispatch_logs','id'),
      ]);
      setJobs(j); setGrnData(g); setPLogs(pl); setFLogs(fl);
      setOsLogs(ol); setDLogs(dl);
      console.log('Phase 1: Loaded',j.length,'jobs');
      setLoading(false);
      
      // Phase 2: Load batches + line items in background
      const [b,li] = await Promise.all([
        fetchAll('batches','id'),
        fetchAll('line_items','id'),
      ]);
      setBatches(b); setItems(li);
      console.log('Phase 2: Loaded',b.length,'batches',li.length,'items');
    }
    load();
  },[]);

  // ─── CREATE JOB ───────────────────────────────────────────
  const createJob = useCallback(async (jobData, batchData, lineItemsData) => {
    const {error:je} = await sb.from('jobs').insert(jobData);
    if(je){show("Error: "+je.message,false);return;}
    const {error:be} = await sb.from('batches').insert(batchData);
    if(lineItemsData.length>0) await sb.from('line_items').insert(lineItemsData);
    setJobs(p=>[jobData,...p]);
    setBatches(p=>[batchData,...p]);
    setItems(p=>[...lineItemsData,...p]);
    show("Job created successfully!");
    setPg("jobs");
  },[show]);

  // ─── ADD BATCH TO JOB ─────────────────────────────────────
  const addBatchToJob = useCallback(async (batchData) => {
    const {error} = await sb.from('batches').insert(batchData);
    if(!error) {setBatches(p=>[batchData,...p]); show("Batch added!");}
  },[show]);

  // ─── TOGGLE DEPT ──────────────────────────────────────────
  const togDept = useCallback(async (itemId, dept, newVal) => {
    const col = 'dept_'+dept.toLowerCase();
    await sb.from('line_items').update({[col]:newVal}).eq('id',itemId);
    setItems(p=>p.map(i=>i.id===itemId?{...i,[col]:newVal}:i));
  },[]);

  // ─── ADD GRN ──────────────────────────────────────────────
  const addGRN = useCallback(async (data) => {
    const {error} = await sb.from('grn').insert(data);
    if(!error){setGrnData(p=>[data,...p]);show("GRN saved!");}
    else show("Error: "+error.message,false);
  },[show]);

  // ─── ADD PRINT LOG ────────────────────────────────────────
  const addPrintLog = useCallback(async (data) => {
    const {error} = await sb.from('print_logs').insert(data);
    if(!error){setPLogs(p=>[data,...p]);show("Print log saved!");}
  },[show]);

  // ─── ADD FAB LOG ──────────────────────────────────────────
  const addFabLog = useCallback(async (data) => {
    const {error} = await sb.from('fab_logs').insert(data);
    if(!error){setFLogs(p=>[data,...p]);show("Fab log saved!");}
  },[show]);

  // ─── ADD OUTSOURCE ────────────────────────────────────────
  const addOsLog = useCallback(async (data) => {
    const {error} = await sb.from('outsource_logs').insert(data);
    if(!error){setOsLogs(p=>[data,...p]);show("Outsource saved!");}
  },[show]);

  // ─── MARK OUTSOURCE RETURN ────────────────────────────────
  const markOsReturn = useCallback(async (id) => {
    await sb.from('outsource_logs').update({returned:true,return_date:td()}).eq('id',id);
    setOsLogs(p=>p.map(l=>l.id===id?{...l,returned:true,return_date:td()}:l));
    show("Return recorded!");
  },[show]);

  // ─── ADD DISPATCH ─────────────────────────────────────────
  const addDispatch = useCallback(async (data) => {
    const {error} = await sb.from('dispatch_logs').insert(data);
    if(!error){setDLogs(p=>[data,...p]);show("Dispatch logged!");}
  },[show]);

  // ─── UPDATE BATCH BILL ────────────────────────────────────
  const saveBill = useCallback(async (batchId, billNo) => {
    await sb.from('batches').update({bill_no:billNo,status:'Done'}).eq('id',batchId);
    setBatches(p=>p.map(b=>b.id===batchId?{...b,bill_no:billNo,status:'Done'}:b));
    show("Tally invoice saved!");
  },[show]);

  // ─── UPDATE JOB STATUS ─────────────────────────────────────
  const updateJobStatus = useCallback(async (jobId, newStatus) => {
    await sb.from('jobs').update({status:newStatus}).eq('id',jobId);
    setJobs(p=>p.map(j=>j.id===jobId?{...j,status:newStatus}:j));
    // Also update dept flags based on new status
    const statusDepts={'Quotation Sent':[1,0,0,0,0,0,0,0],'Designing':[1,0,0,0,0,0,0,0],'Recce Pending':[1,0,0,0,0,0,0,0],'PO Pending':[1,0,0,0,0,0,0,0],
      'Printing':[1,1,1,0,0,0,0,0],'Fabrication':[1,1,1,1,0,0,0,0],'Installation':[1,1,1,1,1,1,0,0],
      'Delivered':[1,1,1,1,1,1,1,0],'Billing Pending':[1,1,1,1,1,1,1,0],'Given for Billing':[1,1,1,1,1,1,1,0],
      'Billing Done':[1,1,1,1,1,1,1,1],'Cash Received':[1,1,1,1,1,1,1,1],'No Bill':[1,1,1,1,1,1,1,1],'Cancelled':[1,1,1,1,1,1,1,1]};
    const flags=statusDepts[newStatus]||[0,0,0,0,0,0,0,0];
    const deptCols=['dept_estimate','dept_design','dept_production','dept_printing','dept_fabrication','dept_dispatch','dept_installation','dept_accounts'];
    const updates={};deptCols.forEach((c,i)=>{updates[c]=!!flags[i];});
    const jobItems=items.filter(i=>i.job_id===jobId);
    for(const it of jobItems){await sb.from('line_items').update(updates).eq('id',it.id);}
    setItems(p=>p.map(i=>i.job_id===jobId?{...i,...updates}:i));
    show("Status updated to "+newStatus);
  },[show,items]);

  // ─── ADD NEW CLIENT ────────────────────────────────────────
  const updateLineItem = useCallback(async (itemId, updates) => {
    await sb.from('line_items').update(updates).eq('id',itemId);
    setItems(p=>p.map(i=>i.id===itemId?{...i,...updates}:i));
  },[]);

  const updateJobFile = useCallback(async (jobId, field, url) => {
    await sb.from('jobs').update({[field]:url}).eq('id',jobId);
    setJobs(p=>p.map(j=>j.id===jobId?{...j,[field]:url}:j));
    show("File uploaded!");
  },[show]);

  const addNewClient = useCallback(async (clientData) => {
    const {error} = await sb.from('clients').insert(clientData);
    if(!error){show("Client added!");}
    return !error;
  },[show]);

  // ─── ADD NEW MATERIAL ──────────────────────────────────────
  const addNewMaterial = useCallback(async (name) => {
    const id='M'+uid();
    const {error} = await sb.from('materials').insert({id,name,default_unit:'roll',code:'',active:true});
    if(!error){show("Material added!");}
    return {id,name};
  },[show]);

  // ─── ADD NEW SUPPLIER ──────────────────────────────────────
  const addNewSupplier = useCallback(async (name) => {
    const id='SUP'+uid();
    const {error} = await sb.from('suppliers').insert({id,name,contact:'',phone:'',gst:''});
    if(!error){show("Supplier added!");}
    return {id,name};
  },[show]);

  // Stock calc
  const stock=useMemo(()=>{
    const s={};
    grnData.forEach(g=>{s[g.material]=(s[g.material]||0)+(+g.qty||0);});
    pLogs.forEach(l=>{s[l.material]=(s[l.material]||0)-(+l.qty_used||0);});
    fLogs.forEach(l=>{s[l.material]=(s[l.material]||0)-(+l.qty_used||0);});
    osLogs.filter(l=>!l.returned).forEach(l=>{s[l.material]=(s[l.material]||0)-(+l.qty_sent||0);});
    return s;
  },[grnData,pLogs,fLogs,osLogs]);

  // Assemble jobs with batches and items
  const fullJobs = useMemo(()=>jobs.map(j=>({
    ...j,
    batches: batches.filter(b=>b.job_id===j.id).map(b=>({
      ...b,
      items: items.filter(i=>i.batch_id===b.id)
    }))
  })),[jobs,batches,items]);

  const stats=useMemo(()=>{
    const sc=(st)=>fullJobs.filter(j=>j.status===st).length;
    return {
      jobs:fullJobs.length,
      active:fullJobs.filter(j=>!['Billing Done','Cancelled','No Bill','Cash Received'].includes(j.status)).length,
      billed:sc('Billing Done'),
      poPend:fullJobs.filter(j=>!j.po_number&&!['Billing Done','Cancelled','No Bill','Cash Received'].includes(j.status)).length,
      printing:sc('Printing'),fab:sc('Fabrication'),install:sc('Installation'),
      design:sc('Designing'),delivered:sc('Delivered'),billPend:sc('Billing Pending'),
      quotation:sc('Quotation Sent'),recce:sc('Recce Pending'),
      grn:grnData.length,os:osLogs.length,disp:dLogs.length,
    };
  },[fullJobs,grnData,osLogs,dLogs]);

  // Role-based nav
  const allNav=[
    {id:"dash",l:"Dashboard",e:"📊",roles:["admin","sales","production","accounts","printing","fabrication","dispatch","designer"]},
    {id:"jobs",l:"All Jobs",e:"📋",roles:["admin","sales","production","accounts","designer"]},
    {id:"new",l:"New Job",e:"➕",roles:["admin","sales"]},
    {id:"dept",l:"Dept Tracker",e:"🏭",roles:["admin","production","sales","designer"]},
    {id:"grn",l:"Material In",e:"📦",roles:["admin","production","dispatch"]},
    {id:"print",l:"Printing",e:"🖨️",roles:["admin","production","printing","designer"]},
    {id:"fab",l:"Fabrication",e:"🔧",roles:["admin","production","fabrication","designer"]},
    {id:"os",l:"Outsource",e:"📤",roles:["admin","production","printing","fabrication","designer"]},
    {id:"disp",l:"Dispatch",e:"🚚",roles:["admin","production","sales","dispatch","designer"]},
    {id:"stock",l:"Stock",e:"📦",roles:["admin","production","dispatch"]},
    {id:"rem",l:"PO Reminders",e:"⏰",roles:["admin","sales"]},
    {id:"cli",l:"Clients",e:"👥",roles:["admin","sales"]},
    {id:"acc",l:"Accounts",e:"🧾",roles:["admin","accounts","sales"]},
  ];
  const nav=allNav.filter(n=>n.roles.includes(user.role));

  if(loading) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}><div className="loader"/><p style={{color:"#64748b",fontSize:12}}>Loading iPrint ERP...</p></div>;

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
      {/* SIDEBAR */}
      <aside style={{width:col?44:180,background:"#060810",borderRight:"1px solid #1a2030",display:"flex",flexDirection:"column",transition:"width .2s",overflow:"hidden",flexShrink:0}}>
        <div style={{padding:"8px",display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid #1a2030",minHeight:38}}>
          <div style={{width:24,height:24,borderRadius:5,background:"linear-gradient(135deg,#e3a008,#ca8a04)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:9,color:"#060810",flexShrink:0}}>iP</div>
          {!col&&<span style={{fontWeight:800,fontSize:11,color:"#e3a008"}}>iPrint ERP</span>}
        </div>
        <nav style={{flex:1,padding:"3px",overflowY:"auto"}}>{nav.map(n=><div key={n.id} className={`ni ${pg===n.id?"on":""}`} onClick={()=>setPg(n.id)}><span style={{fontSize:11,flexShrink:0}}>{n.e}</span>{!col&&<span>{n.l}</span>}</div>)}</nav>
        <div style={{padding:"4px 3px",borderTop:"1px solid #1a2030"}}>
          {!col&&<div style={{padding:"6px 9px",fontSize:10,color:"#64748b",marginBottom:2}}>👤 {user.name} <span className="bd" style={{background:"#e3a00820",color:"#e3a008",marginLeft:4}}>{user.role}</span></div>}
          <div className="ni" onClick={onLogout}><span>🚪</span>{!col&&<span>Logout</span>}</div>
          <div className="ni" onClick={()=>setCol(p=>!p)}><span>{col?"▸":"◂"}</span></div>
        </div>
      </aside>

      {/* MAIN */}
      <main style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{height:38,borderBottom:"1px solid #1a2030",display:"flex",alignItems:"center",padding:"0 12px",gap:8,flexShrink:0}}>
          <h2 style={{fontWeight:700,fontSize:12,flex:1}}>{nav.find(n=>n.id===pg)?.l||"iPrint"}</h2>
          <div style={{position:"relative"}}><input className="in" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:150,paddingLeft:22,fontSize:10}}/><span style={{position:"absolute",left:6,top:"50%",transform:"translateY(-50%)",fontSize:10}}>🔍</span></div>
        </header>
        <div style={{flex:1,overflow:"auto",padding:12}} key={pg}>
          {pg==="dash"&&<DashPage s={stats} stock={stock} sp={setPg} jobs={fullJobs} firms={firms} sm={setModal} updateJobStatus={updateJobStatus} togDept={togDept} addBatchToJob={addBatchToJob} show={show} updateLineItem={updateLineItem} updateJobFile={updateJobFile}/>}
          {pg==="jobs"&&<JobsPage jobs={fullJobs} s={search} firms={firms} togDept={togDept} addBatchToJob={addBatchToJob} show={show} sp={setPg} sm={setModal} updateJobStatus={updateJobStatus} updateLineItem={updateLineItem} updateJobFile={updateJobFile}/>}
          {pg==="new"&&<NewJobPage firms={firms} clients={clients} products={products} team={masterData.team} machines={machines} createJob={createJob} addNewClient={addNewClient} sp={setPg} jobs={fullJobs} user={user}/>}
          {pg==="dept"&&<DeptPage jobs={fullJobs} s={search} togDept={togDept} updateJobStatus={updateJobStatus}/>}
          {pg==="grn"&&<GRNPage grn={grnData} suppliers={suppliers} materials={materials} team={masterData.team} addGRN={addGRN} addNewMaterial={addNewMaterial} addNewSupplier={addNewSupplier}/>}
          {pg==="print"&&<PrintPage logs={pLogs} machines={machines} materials={materials} team={masterData.team} stock={stock} addLog={addPrintLog}/>}
          {pg==="fab"&&<FabPage logs={fLogs} materials={materials} team={masterData.team} stock={stock} addLog={addFabLog}/>}
          {pg==="os"&&<OsPage logs={osLogs} agencies={agencies} materials={materials} addLog={addOsLog} markReturn={markOsReturn}/>}
          {pg==="disp"&&<DispPage logs={dLogs} delBoys={delBoys} addLog={addDispatch}/>}
          {pg==="stock"&&<StockPage stock={stock} grn={grnData} pl={pLogs} fl={fLogs}/>}
          {pg==="rem"&&<RemPage jobs={fullJobs}/>}
          {pg==="cli"&&<CliPage clients={clients} jobs={fullJobs} s={search}/>}
          {pg==="acc"&&<AccPage jobs={fullJobs} batches={batches} items={items} saveBill={saveBill} firms={firms} updateJobStatus={updateJobStatus}/>}
        </div>
      </main>

      {modal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"20px 10px",overflowY:"auto"}} onClick={()=>setModal(null)}><div style={{background:"#0c1017",border:"1px solid #1a2030",borderRadius:12,width:"100%",maxWidth:1050,padding:18,animation:"fi .2s"}} onClick={e=>e.stopPropagation()}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><h3 style={{fontSize:13,fontWeight:700}}>{modal.t}</h3><button className="b bs" onClick={()=>setModal(null)}>✕</button></div>{modal.x}</div></div>}
      {toast&&<div style={{position:"fixed",bottom:12,right:12,background:toast.ok?"#238636":"#da3633",color:"#fff",padding:"6px 12px",borderRadius:6,fontWeight:600,fontSize:11,zIndex:200,animation:"sr .3s"}}>✓ {toast.m}</div>}
    </div>
  );
}

// ─── SMALL COMPONENTS ───────────────────────────────────────
function SC({l,v,s,c="#e3a008",d=0}){return <div className="c a" style={{padding:"10px 12px",animationDelay:`${d}ms`}}><p style={{fontSize:8.5,color:"#64748b",textTransform:"uppercase",letterSpacing:".05em",fontWeight:600,marginBottom:2}}>{l}</p><p className="mn" style={{fontSize:16,fontWeight:700,color:c}}>{v}</p>{s&&<p style={{fontSize:9,color:"#64748b"}}>{s}</p>}</div>;}
function FB({f,firms}){const fm=firms?.find(x=>x.code===f);return fm?<span className="bd" style={{background:fm.color+"20",color:fm.color}}>{fm.short_name}</span>:null;}
function Ck({on,onClick}){return <div className={`ck ${on?"on":""}`} onClick={onClick}>{on?"✓":""}</div>;}
function F({l,children}){return <div><label style={{fontSize:8.5,color:"#64748b",fontWeight:600,textTransform:"uppercase",display:"block",marginBottom:1}}>{l}</label>{children}</div>;}

// DASHBOARD
// ═══════════════════════════════════════════════════════════
function DashPage({s,stock,sp,jobs,firms,sm,updateJobStatus,togDept,addBatchToJob,show,updateLineItem,updateJobFile}){
  const [dq,setDq]=useState("");
  const low=Object.entries(stock).filter(([,v])=>v<=2&&v>=0).slice(0,5);
  const results=useMemo(()=>{
    if(!dq||dq.length<2) return [];
    const q=dq.toLowerCase();
    return jobs.filter(j=>
      j.id?.toLowerCase().includes(q)||
      j.client_name?.toLowerCase().includes(q)||
      j.project?.toLowerCase().includes(q)||
      j.po_number?.toLowerCase().includes(q)||
      j.contact_person?.toLowerCase().includes(q)||
      (j.batches||[]).some(b=>b.bill_no?.toLowerCase().includes(q))
    ).slice(0,20);
  },[dq,jobs]);
  const sc={'Quotation Sent':'#3b82f6','Designing':'#8b5cf6','Printing':'#ef4444','Fabrication':'#dc2626','Installation':'#059669','Delivered':'#10b981','Billing Pending':'#06b6d4','Billing Done':'#4ade80','Cancelled':'#64748b','No Bill':'#64748b','Cash Received':'#4ade80','Recce Pending':'#f59e0b','PO Pending':'#f47067','Active':'#64748b'};
  const openJob=(j)=>sm({t:`Job ${j.id} — ${j.project}`,x:<JobDetail j={j} firms={firms} togDept={togDept} addBatchToJob={addBatchToJob} show={show} updateJobStatus={updateJobStatus} updateLineItem={updateLineItem} updateJobFile={updateJobFile}/>});
  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
    <div className="c" style={{padding:10}}>
      <div style={{position:"relative"}}><input className="in" placeholder="🔍 Search by Job#, Invoice#, Client, Project, PO#..." value={dq} onChange={e=>setDq(e.target.value)} style={{fontSize:12,padding:"8px 12px",paddingLeft:12}}/></div>
      {results.length>0&&<div style={{marginTop:6,maxHeight:300,overflowY:"auto"}}><table><thead><tr><th>Job</th><th>Firm</th><th>Client</th><th>Project</th><th>Status</th><th>Invoice</th></tr></thead><tbody>
        {results.map(j=>{const bn=(j.batches||[]).map(b=>b.bill_no).filter(Boolean).join(', ');return <tr key={j.id} style={{cursor:"pointer"}} onClick={()=>openJob(j)}><td className="mn" style={{fontSize:10,color:"#e3a008",fontWeight:700}}>{j.id}</td><td><FB f={j.firm} firms={firms}/></td><td style={{fontSize:10}}>{j.client_name?.slice(0,22)}</td><td style={{fontSize:10,color:"#64748b"}}>{j.project?.slice(0,20)}</td><td><span className="bd" style={{background:(sc[j.status]||'#64748b')+'20',color:sc[j.status]||'#64748b'}}>{j.status}</span></td><td className="mn" style={{fontSize:10,color:"#06b6d4"}}>{bn||'—'}</td></tr>})}
      </tbody></table></div>}
      {dq.length>=2&&results.length===0&&<p style={{fontSize:10,color:"#64748b",marginTop:4}}>No results found for "{dq}"</p>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:7}}>
      <SC l="Total Jobs" v={s.jobs} s={`${s.active} active`}/><SC l="Quotation Sent" v={s.quotation} c="#3b82f6" d={30}/><SC l="Designing" v={s.design} c="#8b5cf6" d={60}/><SC l="Printing" v={s.printing} c="#ef4444" d={90}/><SC l="Fabrication" v={s.fab} c="#dc2626" d={120}/><SC l="Installation" v={s.install} c="#059669" d={150}/><SC l="Billing Pending" v={s.billPend} c="#06b6d4" d={180}/><SC l="Delivered" v={s.delivered} c="#10b981" d={210}/><SC l="Billed" v={s.billed} c="#4ade80" d={240}/><SC l="PO Pending" v={s.poPend} c="#f47067" d={270}/><SC l="Recce Pending" v={s.recce} c="#f59e0b" d={300}/>
    </div>
    {low.length>0&&<div className="c" style={{padding:10,borderColor:"#f4706733"}}><p style={{fontSize:9,color:"#f47067",fontWeight:700,marginBottom:4}}>⚠️ Low Stock</p><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{low.map(([m,q])=><span key={m} style={{background:"#1a0505",border:"1px solid #f4706733",borderRadius:5,padding:"3px 6px",fontSize:9.5}}><strong style={{color:"#f47067"}}>{q}</strong> {m}</span>)}</div></div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:5}}>{[{l:"New Job",p:"new",e:"➕"},{l:"Material In",p:"grn",e:"📦"},{l:"Printing",p:"print",e:"🖨️"},{l:"Fabrication",p:"fab",e:"🔧"},{l:"Outsource",p:"os",e:"📤"},{l:"Dispatch",p:"disp",e:"🚚"},{l:"Stock",p:"stock",e:"📊"},{l:"Accounts",p:"acc",e:"🧾"}].map(a=><button key={a.l} className="b" style={{padding:8,justifyContent:"flex-start"}} onClick={()=>sp(a.p)}>{a.e} {a.l}</button>)}</div>
  </div>;
}

// ALL JOBS
// ═══════════════════════════════════════════════════════════
function JobsPage({jobs,s,firms,togDept,addBatchToJob,show,sp,sm,updateJobStatus,updateLineItem,updateJobFile}){
  const [ff,sf]=useState("All");
  const [fy,setFy]=useState("All");
  const fl=jobs.filter(j=>{if(s){const q=s.toLowerCase();if(!j.id?.toLowerCase().includes(q)&&!j.client_name?.toLowerCase().includes(q)&&!j.project?.toLowerCase().includes(q))return false;}if(ff!=="All"&&j.firm!==ff)return false;if(fy==="25-26"&&!j.id?.includes("2526")&&!j.id?.includes("2527"))return false;if(fy==="26-27"&&!j.id?.includes("2627"))return false;return true;});
  
  const openJob=(j)=>sm({t:`Job ${j.id} — ${j.project}`,x:<JobDetail j={j} firms={firms} togDept={togDept} addBatchToJob={addBatchToJob} show={show} updateJobStatus={updateJobStatus} updateLineItem={updateLineItem} updateJobFile={updateJobFile}/>});

  return <div style={{display:"flex",flexDirection:"column",gap:7}}>
    <div style={{display:"flex",justifyContent:"space-between",gap:3,flexWrap:"wrap"}}>
      <div style={{display:"flex",gap:2}}>
        {["All","JPP","JXT","VHD"].map(f=><button key={f} className={`b bs ${ff===f?"bp":""}`} onClick={()=>sf(f)}>{f==="All"?"All":firms.find(x=>x.code===f)?.short_name||f}</button>)}
        <span style={{borderLeft:"1px solid #1a2030",margin:"0 4px"}}/>
        {["All","25-26","26-27"].map(f=><button key={f} className={`b bs ${fy===f?"bp":""}`} onClick={()=>setFy(f)}>FY {f}</button>)}
      </div>
      <div style={{display:"flex",gap:2}}><span style={{fontSize:10,color:"#64748b",alignSelf:"center"}}>{fl.length} jobs</span><button className="b bp bs" onClick={()=>sp("new")}>➕ New Job</button></div>
    </div>
    <div className="c" style={{padding:0}}><div style={{overflowX:"auto",maxHeight:"calc(100vh-130px)"}}><table><thead><tr><th>Job</th><th>Firm</th><th>Client</th><th>Project</th><th>Status</th><th>Batches</th><th>PO</th><th>By</th></tr></thead><tbody>
      {fl.map(j=>{const sc={'Quotation Sent':'#3b82f6','Designing':'#8b5cf6','Printing':'#ef4444','Fabrication':'#dc2626','Installation':'#059669','Delivered':'#10b981','Billing Pending':'#06b6d4','Billing Done':'#4ade80','Cancelled':'#64748b','No Bill':'#64748b','Cash Received':'#4ade80','Recce Pending':'#f59e0b','PO Pending':'#f47067','Active':'#64748b'};
        return <tr key={j.id} style={{cursor:"pointer"}} onClick={()=>openJob(j)}><td className="mn" style={{fontWeight:700,fontSize:10,color:"#e3a008"}}>{j.id}</td><td><FB f={j.firm} firms={firms}/></td><td style={{fontSize:10.5,maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{j.client_name}</td><td style={{fontSize:10,color:"#64748b"}}>{j.project}</td><td><span className="bd" style={{background:(sc[j.status]||'#64748b')+'20',color:sc[j.status]||'#64748b'}}>{j.status}</span></td><td className="mn" style={{fontSize:10}}>{j.batches?.length||0}</td><td>{j.po_number?<span style={{color:"#4ade80",fontSize:8}}>✓</span>:<span style={{color:"#f47067",fontSize:8}}>⚠️</span>}</td><td style={{fontSize:10}}>{j.made_by}</td></tr>;})}</tbody></table></div></div>
  </div>;
}

// JOB DETAIL
function JobDetail({j,firms,togDept,addBatchToJob,show,updateJobStatus,updateLineItem,updateJobFile}){
  const ALL_ST=['Quotation Sent','PO Pending','PO Received','Recce Pending','Designing','Printing','Fabrication','Installation','Delivered','Billing Pending','Given for Billing','Cash Pending','Proforma Invoice','IC Pending','Billing Done','Cash Received','No Bill','Cancelled'];
  const [vm,svm]=useState("internal");
  const [ed,setEd]=useState(null); // editing item id
  const [ef,setEf]=useState({}); // edit form
  const [sa,ssa]=useState(false);const [nn,snn]=useState("");
  const fm=firms.find(f=>f.code===j.firm)||{};
  const ab=async()=>{const bd={id:"B"+uid(),job_id:j.id,date:td(),note:nn||"New",bill_no:"",status:"New"};await addBatchToJob(bd);snn("");ssa(false);};
  const startEdit=(it)=>{setEd(it.id);setEf({internal_name:it.internal_name||'',client_name:it.client_name||'',media:it.media||'',qty:it.qty||1,rate:it.rate||0,width:it.width||'',height:it.height||''});};
  const saveEdit=async(itId)=>{if(updateLineItem)await updateLineItem(itId,ef);setEd(null);show("Item updated!");};
  
  return <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:"75vh",overflowY:"auto"}}>
    <div style={{display:"flex",justifyContent:"space-between"}}><div><p className="mn" style={{fontSize:16,fontWeight:800,color:"#e3a008"}}>{j.id}</p><p style={{fontSize:10,color:"#64748b"}}>{j.project} · {j.client_name}</p></div>
      <div style={{display:"flex",gap:2}}><FB f={j.firm} firms={firms}/><button className={`b bs ${vm==="internal"?"bp":""}`} onClick={()=>svm("internal")}>Internal</button><button className={`b bs ${vm==="client"?"bp":""}`} onClick={()=>svm("client")}>DC</button></div></div>
    <div className="fg f3" style={{fontSize:10,background:"#060810",border:"1px solid #1a2030",borderRadius:6,padding:8}}>
      {[["By",j.made_by],["PO",j.po_number||"⚠️ Pending"],["Contact",j.contact_person],["Phone",j.contact_no],["Delivery",j.delivery_address?.slice(0,40)],["Firm",fm.name]].map(([k,v])=><div key={k}><span style={{color:"#64748b",fontSize:8}}>{k}</span><p style={{fontWeight:600}}>{v||"—"}</p></div>)}
      <div><span style={{color:"#64748b",fontSize:8}}>STATUS</span><select className="in" value={j.status} onChange={e=>{if(updateJobStatus)updateJobStatus(j.id,e.target.value)}} style={{fontSize:10,padding:"3px 4px",marginTop:2}}>{ALL_ST.map(st=><option key={st}>{st}</option>)}</select></div>
      <div><span style={{color:"#64748b",fontSize:8}}>BILLING</span><p style={{fontWeight:600}}>{(j.batches||[]).map(b=>b.bill_no).filter(Boolean).join(', ')||"—"}</p></div>
    </div>
    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
      <div><span style={{color:"#64748b",fontSize:8,display:"block"}}>📎 PO COPY</span>{j.po_file_url?<a href={j.po_file_url} target="_blank" style={{color:"#3b82f6",fontSize:10}}>📄 View PO</a>:<span style={{fontSize:9,color:"#64748b"}}>Not uploaded</span>}<input type="file" accept=".pdf,.jpg,.png" className="in" style={{padding:2,width:160,marginTop:2}} onChange={async e=>{const f=e.target.files[0];if(f){const url=await uploadFile(f,'po');if(url&&updateJobFile)updateJobFile(j.id,'po_file_url',url);}}}/></div>
      <div><span style={{color:"#64748b",fontSize:8,display:"block"}}>📎 DELIVERY CHALLAN</span>{j.dc_file_url?<a href={j.dc_file_url} target="_blank" style={{color:"#3b82f6",fontSize:10}}>📄 View DC</a>:<span style={{fontSize:9,color:"#64748b"}}>Not uploaded</span>}<input type="file" accept=".pdf,.jpg,.png" className="in" style={{padding:2,width:160,marginTop:2}} onChange={async e=>{const f=e.target.files[0];if(f){const url=await uploadFile(f,'dc');if(url&&updateJobFile)updateJobFile(j.id,'dc_file_url',url);}}}/></div>
      <div><span style={{color:"#64748b",fontSize:8,display:"block"}}>📎 INSTALLATION CERT</span>{j.ic_file_url?<a href={j.ic_file_url} target="_blank" style={{color:"#3b82f6",fontSize:10}}>📄 View IC</a>:<span style={{fontSize:9,color:"#64748b"}}>Not uploaded</span>}<input type="file" accept=".pdf,.jpg,.png" className="in" style={{padding:2,width:160,marginTop:2}} onChange={async e=>{const f=e.target.files[0];if(f){const url=await uploadFile(f,'ic');if(url&&updateJobFile)updateJobFile(j.id,'ic_file_url',url);}}}/></div>
      <div><span style={{color:"#64748b",fontSize:8,display:"block"}}>📸 WORK PHOTOS</span>{(j.work_photos||[]).length>0?<div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:3}}>{j.work_photos.map((u,i)=><a key={i} href={u} target="_blank" style={{color:"#3b82f6",fontSize:9}}>📸{i+1}</a>)}</div>:<span style={{fontSize:9,color:"#64748b"}}>None</span>}<input type="file" accept="image/*" multiple className="in" style={{padding:2,width:160,marginTop:2}} onChange={async e=>{const files=[...e.target.files];if(files.length){const urls=await uploadMultiple(files,'photos');if(urls.length){const all=[...(j.work_photos||[]),...urls];await sb.from('jobs').update({work_photos:all}).eq('id',j.id);show(urls.length+" photo(s) uploaded!");}}}}/></div>
    </div>
    {(j.batches||[]).map((b,bi)=><div key={b.id} className="c" style={{padding:0,overflow:"hidden"}}>
      <div style={{padding:"5px 8px",borderBottom:"1px solid #1a2030",background:"#0a0f1a",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10}}><strong style={{color:"#e3a008"}}>Batch {bi+1}</strong> · {b.date} · {b.note}</span>{b.bill_no&&<span className="mn" style={{fontSize:9,color:"#06b6d4"}}>{b.bill_no}</span>}</div>
      <div style={{overflowX:"auto"}}><table><thead><tr><th>Sr</th><th>{vm==="internal"?"Internal":"Client (DC)"}</th><th>Material</th><th>Size</th><th>Qty</th><th>Rate</th><th>Amt</th><th>Edit</th>{DEPTS.map(d=><th key={d} style={{fontSize:7,textAlign:"center",padding:"2px 1px",minWidth:28}}>{d.slice(0,3)}</th>)}</tr></thead>
        <tbody>{(b.items||[]).map((it,ii)=>{const dn=DEPTS.every(d=>it['dept_'+d.toLowerCase()]);const isEd=ed===it.id;
          return isEd?<tr key={it.id} style={{background:"#0a1520"}}><td className="mn" style={{fontSize:9}}>{ii+1}</td>
            <td><input className="in" value={ef.internal_name} onChange={e=>setEf(p=>({...p,internal_name:e.target.value}))} style={{fontSize:10,padding:"2px 4px"}}/></td>
            <td><input className="in" value={ef.media} onChange={e=>setEf(p=>({...p,media:e.target.value}))} style={{fontSize:10,padding:"2px 4px"}}/></td>
            <td><div style={{display:"flex",gap:1}}><input className="in mn" value={ef.width} onChange={e=>setEf(p=>({...p,width:e.target.value}))} style={{width:28,fontSize:9,padding:"2px"}}/><span style={{color:"#64748b"}}>×</span><input className="in mn" value={ef.height} onChange={e=>setEf(p=>({...p,height:e.target.value}))} style={{width:28,fontSize:9,padding:"2px"}}/></div></td>
            <td><input className="in mn" type="number" value={ef.qty} onChange={e=>setEf(p=>({...p,qty:+e.target.value}))} style={{width:35,fontSize:10,padding:"2px 4px"}}/></td>
            <td><input className="in mn" type="number" value={ef.rate} onChange={e=>setEf(p=>({...p,rate:+e.target.value}))} style={{width:50,fontSize:10,padding:"2px 4px"}}/></td>
            <td></td>
            <td><div style={{display:"flex",gap:2}}><button className="b bg bs" onClick={()=>saveEdit(it.id)}>✓</button><button className="b bs" onClick={()=>setEd(null)}>✕</button></div></td>
            <td colSpan={8}></td></tr>
          :<tr key={it.id} className={dn?"done":""}><td className="mn" style={{fontSize:9}}>{ii+1}</td><td style={{fontSize:10,fontWeight:600}}>{vm==="internal"?it.internal_name:it.client_name}</td><td style={{fontSize:9.5,color:"#8b949e"}}>{it.media?.slice(0,20)}</td><td className="mn" style={{fontSize:9}}>{it.width&&it.height?it.width+'×'+it.height:''}</td><td className="mn" style={{fontSize:10}}>{it.qty}</td><td className="mn" style={{fontSize:10}}>₹{(+it.rate||0).toFixed(2)}</td><td className="mn" style={{fontSize:10,fontWeight:700,color:"#e3a008"}}>{fmt(it.amount)}</td><td><button className="b bs" onClick={()=>startEdit(it)} style={{fontSize:8,padding:"1px 4px"}}>✏️</button></td>{DEPTS.map(d=><td key={d} style={{textAlign:"center",padding:"2px 1px"}}><Ck on={it['dept_'+d.toLowerCase()]} onClick={()=>togDept(it.id,d,!it['dept_'+d.toLowerCase()])}/></td>)}</tr>})}</tbody></table></div>
    </div>)}
    {sa?<div className="c" style={{padding:8}}><div style={{display:"flex",gap:4}}><input className="in" placeholder="Batch note..." value={nn} onChange={e=>snn(e.target.value)} style={{flex:1}}/><button className="b bp" onClick={ab}>Add</button><button className="b" onClick={()=>ssa(false)}>✕</button></div></div>:<button className="b bp" onClick={()=>ssa(true)}>➕ Add Batch</button>}
  </div>;
}

</td><td class="r">₹'+it.tot.toFixed(2)+'</td><td class="r">'+(it.gstPct||18)+'%</td><td class="r">₹'+it.gst.toFixed(2)+'</td><td class="r"><b>₹'+it.amt.toFixed(2)+'</b></td></tr>').join('')}<tr class="total"><td colspan="5" style="text-align:right"><b>TOTAL</b></td><td class="r"><b>${totQty}</b></td><td class="r"><b>${totSqft}</b></td><td></td><td class="r"><b>₹${tot.s.toFixed(2)}</b></td><td></td><td class="r"><b>₹${tot.g.toFixed(2)}</b></td><td class="r"><b>₹${tot.t.toFixed(2)}</b></td></tr></tbody></table><div class="terms"><p><b>Terms & Conditions:</b></p><p>${f.pt||''}</p>${f.remark?'<p style="margin-top:4px"><b>Remark:</b> '+f.remark+'</p>':''}<p style="margin-top:4px"><b>Purchase Order:</b> We would require a P.O on the name of ${firmData.name||''}</p></div></body></html>`;

    }} style={{gap:6}}>📧 Email to Client</button>}<button className="b bp" onClick={sub} style={{padding:"7px 18px"}}>Create {jid}</button></div>
  </div>;
}

function DeptPage({jobs,s,togDept,updateJobStatus}){
  const ALL_ST=['Quotation Sent','PO Pending','PO Received','Recce Pending','Designing','Printing','Fabrication','Installation','Delivered','Billing Pending','Given for Billing','Cash Pending','Proforma Invoice','IC Pending','Billing Done','Cash Received','No Bill','Cancelled'];
  const tabs=[
    {id:'Estimate',l:'Estimate',c:'#3b82f6',st:['Quotation Sent','PO Pending','PO Received','Recce Pending','Active']},
    {id:'Design',l:'Design',c:'#8b5cf6',st:['Designing']},
    {id:'Printing',l:'Printing',c:'#ef4444',st:['Printing']},
    {id:'Fabrication',l:'Fabrication',c:'#dc2626',st:['Fabrication']},
    {id:'Installation',l:'Installation',c:'#059669',st:['Installation']},
    {id:'Dispatch',l:'Dispatch',c:'#10b981',st:['Delivered']},
    {id:'Accounts',l:'Accounts',c:'#06b6d4',st:['Billing Pending','Given for Billing','Cash Pending','Proforma Invoice','IC Pending']},
  ];
  const [ad,sad]=useState(tabs[0].id);
  const cur=tabs.find(t=>t.id===ad);
  const pen=useMemo(()=>jobs.filter(j=>{if(s&&!j.id?.toLowerCase().includes(s.toLowerCase())&&!j.client_name?.toLowerCase().includes(s.toLowerCase()))return false;return cur.st.includes(j.status);}),[jobs,cur,s]);

    {sf&&<div className="c a" style={{padding:10}}><div className="fg f4">
      <F l="Date"><input type="date" className="in" value={f.date} onChange={e=>sF(p=>({...p,date:e.target.value}))}/></F>
      <F l="Agency"><select className="in" value={f.agency} onChange={e=>sF(p=>({...p,agency:e.target.value}))}>{agencies.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}</select></F>
      <F l="Job#"><input className="in mn" value={f.job_id} onChange={e=>sF(p=>({...p,job_id:e.target.value}))}/></F>
      <F l="Material"><select className="in" value={f.material} onChange={e=>sF(p=>({...p,material:e.target.value}))}>{materials.map(m=><option key={m.id} value={m.name}>{m.name}</option>)}</select></F>
      <F l="Qty"><input className="in mn" type="number" value={f.qty_sent} onChange={e=>sF(p=>({...p,qty_sent:e.target.value}))}/></F>
      <F l="Challan#"><input className="in mn" value={f.challan_no} onChange={e=>sF(p=>({...p,challan_no:e.target.value}))}/></F>
      <F l="Rate"><input className="in mn" value={f.rate} onChange={e=>sF(p=>({...p,rate:e.target.value}))}/></F>
      <F l="📸 Challan"><input type="file" accept="image/*" capture className="in" style={{padding:2}}/></F>
    </div><button className="b bp" onClick={add} style={{marginTop:6}}>Save</button></div>}
    <div className="c" style={{padding:0}}><div style={{overflowX:"auto"}}><table><thead><tr><th>Date</th><th>Agency</th><th>Material</th><th>Qty</th><th>Challan</th><th>Job</th><th>Rate</th><th>Status</th><th></th></tr></thead><tbody>
      {logs.map(l=><tr key={l.id}><td>{l.date}</td><td style={{fontWeight:600}}>{l.agency}</td><td>{l.material}</td><td className="mn">{l.qty_sent}</td><td className="mn">{l.challan_no}</td><td className="mn" style={{color:"#e3a008"}}>{l.job_id}</td><td className="mn">₹{l.rate}</td><td>{l.returned?<span className="bd" style={{background:"#23863620",color:"#4ade80"}}>Ret</span>:<span className="bd" style={{background:"#e3a00820",color:"#e3a008"}}>Out</span>}</td><td>{!l.returned&&<button className="b bg bs" onClick={()=>markReturn(l.id)}>Return</button>}</td></tr>)}
      {logs.length===0&&<tr><td colSpan={9} style={{textAlign:"center",color:"#64748b",padding:16}}>None</td></tr>}
    </tbody></table></div></div></div>;
}

// DISPATCH
function DispPage({logs,delBoys,addLog}){const [sf,ssf]=useState(false);const [f,sF]=useState({date:td(),job_id:"",dispatch_type:"Delivery Only",delivery_boy:delBoys[0]?.name||"",vehicle:"",lr_no:"",challan_no:"",installer:"",install_date:""});
  const add=async()=>{await addLog({id:"D"+uid(),...f});};
  return <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <button className="b bp" onClick={()=>ssf(p=>!p)}>{sf?"▾":"🚚 New Dispatch"}</button>
    {sf&&<div className="c a" style={{padding:10}}><div className="fg f3">
      <F l="Date"><input type="date" className="in" value={f.date} onChange={e=>sF(p=>({...p,date:e.target.value}))}/></F>
      <F l="Job#"><input className="in mn" value={f.job_id} onChange={e=>sF(p=>({...p,job_id:e.target.value}))}/></F>
      <F l="Type"><select className="in" value={f.dispatch_type} onChange={e=>sF(p=>({...p,dispatch_type:e.target.value}))}><option>Delivery Only</option><option>Delivery + Install</option></select></F>
      <F l="Del Boy"><select className="in" value={f.delivery_boy} onChange={e=>sF(p=>({...p,delivery_boy:e.target.value}))}>{delBoys.map(d=><option key={d.id} value={d.name}>{d.name}</option>)}<option>Other</option></select></F>
      <F l="Vehicle/Courier"><input className="in" value={f.vehicle} onChange={e=>sF(p=>({...p,vehicle:e.target.value}))}/></F>
      <F l="LR/Track#"><input className="in mn" value={f.lr_no} onChange={e=>sF(p=>({...p,lr_no:e.target.value}))}/></F>
      <F l="Challan#"><input className="in mn" value={f.challan_no} onChange={e=>sF(p=>({...p,challan_no:e.target.value}))}/></F>
      <F l="📸 Challan"><input type="file" accept="image/*" className="in" style={{padding:2}}/></F>
      <F l="📸 POD"><input type="file" accept="image/*" className="in" style={{padding:2}}/></F>
      {f.dispatch_type.includes("Install")&&<><F l="Installer"><input className="in" value={f.installer} onChange={e=>sF(p=>({...p,installer:e.target.value}))}/></F><F l="Install Date"><input type="date" className="in" value={f.install_date} onChange={e=>sF(p=>({...p,install_date:e.target.value}))}/></F></>}
    </div><button className="b bp" onClick={add} style={{marginTop:6}}>Save</button></div>}
    <div className="c" style={{padding:0}}><div style={{overflowX:"auto"}}><table><thead><tr><th>Date</th><th>Job</th><th>Type</th><th>Boy</th><th>Vehicle</th><th>Challan</th><th>LR</th></tr></thead><tbody>
      {logs.map(l=><tr key={l.id}><td>{l.date}</td><td className="mn" style={{color:"#e3a008"}}>{l.job_id}</td><td><span className="bd" style={{background:l.dispatch_type?.includes("Install")?"#8b5cf620":"#10b98120",color:l.dispatch_type?.includes("Install")?"#c084fc":"#4ade80"}}>{l.dispatch_type}</span></td><td>{l.delivery_boy}</td><td>{l.vehicle}</td><td className="mn">{l.challan_no}</td><td className="mn">{l.lr_no}</td></tr>)}
      {logs.length===0&&<tr><td colSpan={7} style={{textAlign:"center",color:"#64748b",padding:16}}>None</td></tr>}
    </tbody></table></div></div></div>;
}

// STOCK
function StockPage({stock,grn,pl,fl}){const rows=Object.entries(stock).filter(([,v])=>v!==0||true).sort((a,b)=>a[0].localeCompare(b[0]));
  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:6}}>
      <SC l="Inward" v={grn.reduce((s,g)=>s+(+g.qty||0),0)} c="#10b981"/><SC l="Print Used" v={pl.reduce((s,l)=>s+(+l.qty_used||0),0)} c="#ef4444" d={30}/><SC l="Fab Used" v={fl.reduce((s,l)=>s+(+l.qty_used||0),0)} c="#dc2626" d={60}/><SC l="Materials" v={rows.length} c="#3b82f6" d={90}/>
    </div>
    <div className="c" style={{padding:0}}><div style={{overflowX:"auto",maxHeight:"calc(100vh-180px)"}}><table><thead><tr><th>Material</th><th>Available</th><th>Status</th></tr></thead><tbody>
      {rows.map(([m,q])=><tr key={m}><td style={{fontWeight:600}}>{m}</td><td className="mn" style={{fontWeight:700}}>{q}</td><td>{q<=0?<span className="bd" style={{background:"#3b060720",color:"#f47067"}}>Out</span>:q<=2?<span className="bd" style={{background:"#3b250620",color:"#f59e0b"}}>Low</span>:<span className="bd" style={{background:"#05200e20",color:"#4ade80"}}>OK</span>}</td></tr>)}
    </tbody></table></div></div></div>;
}

// REMINDERS
function RemPage({jobs}){const rem=jobs.filter(j=>!j.po_number).map(j=>({...j,d:Math.max(0,Math.floor((new Date()-new Date(j.created_at))/864e5))})).sort((a,b)=>b.d-a.d);
  return <div className="c" style={{padding:0}}><table><thead><tr><th>Job</th><th>Client</th><th>Project</th><th>Days</th><th></th></tr></thead><tbody>
    {rem.map(j=><tr key={j.id}><td className="mn" style={{color:"#e3a008",fontWeight:700}}>{j.id}</td><td>{j.client_name?.slice(0,22)}</td><td style={{color:"#64748b"}}>{j.project}</td><td><span style={{color:j.d>30?"#ef4444":"#f59e0b",fontWeight:700}}>{j.d}d</span></td><td><button className="b br bs" onClick={()=>window.open(`mailto:?subject=PO Reminder-${j.id}&body=Dear ${j.contact_person},%0AReminder for PO:%0AJob:${j.id}%0AProject:${j.project}%0APending:${j.d} days%0ARegards,iPrint`)}>📧</button></td></tr>)}
    {rem.length===0&&<tr><td colSpan={5} style={{textAlign:"center",color:"#4ade80",padding:16}}>All POs received!</td></tr>}
  </tbody></table></div>;
}

// CLIENTS
function CliPage({clients,jobs,s}){const fl=clients.filter(c=>!s||c.name?.toLowerCase().includes(s.toLowerCase()));
  return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:7}}>{fl.map(c=>{const cj=jobs.filter(j=>j.client_id===c.id);return <div key={c.id} className="c a" style={{padding:10}}><h4 style={{fontSize:11.5,fontWeight:700}}>{c.name?.slice(0,26)}</h4><p style={{fontSize:10,color:"#64748b"}}>{c.contact} · {c.phone}</p><p style={{fontSize:10,marginTop:3}}><strong>{cj.length}</strong> jobs</p></div>;})}</div>;
}

// ACCOUNTS
function AccPage({jobs,batches,items,saveBill,firms,updateJobStatus}){
  const [tab,setTab]=useState('pending');
  const [invoices,setInvoices]=useState({});
  const tabs=[
    {id:'pending',l:'Billing Pending',c:'#f59e0b',statuses:['Billing Pending','Cash Pending','Proforma Invoice','IC Pending']},
    {id:'given',l:'Given for Billing',c:'#06b6d4',statuses:['Given for Billing','Delivered']},
    {id:'done',l:'Billing Completed',c:'#4ade80',statuses:['Billing Done','Cash Received','No Bill']},
  ];
  const cur=tabs.find(t=>t.id===tab);
  const filtered=jobs.filter(j=>cur.statuses.includes(j.status));
  const sc={'Billing Pending':'#f59e0b','Cash Pending':'#e3a008','Proforma Invoice':'#8b5cf6','IC Pending':'#f47067','Given for Billing':'#06b6d4','Delivered':'#10b981','Billing Done':'#4ade80','Cash Received':'#4ade80','No Bill':'#64748b'};
  const markBilled=async(j)=>{const inv=invoices[j.id];if(!inv){alert("Enter invoice#");return;}const bid=(j.batches||[])[0]?.id;if(bid)await saveBill(bid,inv);await updateJobStatus(j.id,'Billing Done');setInvoices(p=>({...p,[j.id]:''}));};
  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
    <div style={{display:"flex",gap:3}}>{tabs.map(t=><button key={t.id} className={`b ${tab===t.id?"bp":""}`} onClick={()=>setTab(t.id)} style={tab!==t.id?{borderColor:t.c+"55",color:t.c}:{}}>{t.l} ({jobs.filter(j=>t.statuses.includes(j.status)).length})</button>)}</div>
    <div className="c" style={{padding:0}}><div style={{padding:"6px 8px",borderBottom:`2px solid ${cur.c}`,background:"#0a0f1a"}}><span style={{fontSize:10,fontWeight:700,color:cur.c}}>{cur.l} — {filtered.length} jobs</span></div>
    <div style={{overflowX:"auto",maxHeight:"calc(100vh-180px)"}}><table><thead><tr><th>Job</th><th>Firm</th><th>Client</th><th>Project</th><th>Status</th><th>PO</th>{tab!=='done'&&<><th>Invoice#</th><th>📎 DC</th><th>📎 IC</th><th>Action</th></>}{tab==='done'&&<th>Invoice#</th>}</tr></thead><tbody>
      {filtered.map(j=>{const bn=(j.batches||[]).map(b=>b.bill_no).filter(Boolean).join(', ');return <tr key={j.id}><td className="mn" style={{fontSize:10,color:"#e3a008",fontWeight:700}}>{j.id}</td><td><FB f={j.firm} firms={firms}/></td><td style={{fontSize:10}}>{j.client_name?.slice(0,22)}</td><td style={{fontSize:10,color:"#64748b"}}>{j.project?.slice(0,18)}</td><td><span className="bd" style={{background:(sc[j.status]||'#64748b')+'20',color:sc[j.status]||'#64748b'}}>{j.status}</span></td><td style={{fontSize:10}}>{j.po_number?<span style={{color:"#4ade80"}}>✓</span>:<span style={{color:"#f47067"}}>⚠️</span>}</td>
        {tab!=='done'&&<><td><input className="in mn" style={{width:100,fontSize:10}} placeholder="Inv#" value={invoices[j.id]||""} onChange={e=>setInvoices(p=>({...p,[j.id]:e.target.value}))}/></td><td><input type="file" accept=".pdf,.jpg,.png" className="in" style={{padding:1,fontSize:9,width:80}}/></td><td><input type="file" accept=".pdf,.jpg,.png" className="in" style={{padding:1,fontSize:9,width:80}}/></td><td><button className="b bg bs" onClick={()=>markBilled(j)}>✓ Bill Done</button></td></>}
        {tab==='done'&&<td className="mn" style={{fontSize:10,color:"#06b6d4"}}>{bn}</td>}
      </tr>})}
      {filtered.length===0&&<tr><td colSpan={tab!=='done'?10:7} style={{textAlign:"center",color:"#4ade80",padding:20}}>No jobs in this category</td></tr>}
    </tbody></table></div></div>
  </div>;
}

// ═══════════════════════════════════════════════════════════
// ROOT APP — Loads master data, then shows Login or MainApp
// ═══════════════════════════════════════════════════════════
function RootApp(){
  const [user,setUser]=useState(null);
  const [masterData,setMasterData]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    async function loadMaster(){
      const [f,c,s,p,m,mac,ag,db,tm] = await Promise.all([
        sb.from('firms').select('*'),
        sb.from('clients').select('*').order('name'),
        sb.from('suppliers').select('*').order('name'),
        sb.from('products').select('*').order('internal_name'),
        sb.from('materials').select('*').order('name'),
        sb.from('machines').select('*'),
        sb.from('outsource_agencies').select('*'),
        sb.from('delivery_boys').select('*'),
        sb.from('team_members').select('*').eq('active',true),
      ]);
      setMasterData({
        firms:f.data||[], clients:c.data||[], suppliers:s.data||[],
        products:p.data||[], materials:m.data||[], machines:mac.data||[],
        agencies:ag.data||[], delBoys:db.data||[], team:tm.data||[],
      });
      setLoading(false);
    }
    loadMaster();
  },[]);

  if(loading) return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,background:"#060810"}}><div className="loader"/><p style={{color:"#64748b",fontSize:12}}>Loading iPrint ERP...</p></div>;

  if(!user) return <Login onLogin={setUser} team={masterData.team}/>;
  return <MainApp user={user} onLogout={()=>setUser(null)} masterData={masterData}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<RootApp/>);
</script>
</body>
